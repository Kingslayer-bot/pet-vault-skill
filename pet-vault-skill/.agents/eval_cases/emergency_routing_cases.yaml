    expected_route: emergency

  - id: seizure
    input: "猫抽搐了"
    expected_route: emergency

  - id: breathing_difficulty
    input: "宠物呼吸困难"
    expected_route: emergency

  - id: unable_urinate
    input: "猫尿不出来"
    expected_route: emergency

  - id: persistent_vomiting
    input: "狗持续呕吐"
