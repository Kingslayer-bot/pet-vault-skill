bill_report:
  triggers:
    material_types: [invoice, bill]
    intents: [explain_bill, cost_breakdown, reimbursement, "被坑", "为什么这么贵"]
  output:
    chat: concise_summary
    pdf: required
    vault_update: true

insurance_precheck:
  triggers:
    material_types: [invoice, insurance_policy, claim_document]
    intents: [claim, reimbursement, "能不能报销", "理赔"]
  output:
    chat: concise_summary
    pdf: required
    legal_judgment: forbidden
    vault_update: true

knowledge_query:
  triggers:
    no_user_material: true
    intents: [term_explanation, general_pet_knowledge]
  output:
    chat: short_answer_with_sources
    pdf: not_required

emergency_boundary:
  triggers:
    terms: [poison, toxin, lily, xylitol, chocolate, grape, raisin, onion, garlic, human medication, cleaning agent, seizure, breathing difficulty, unable to urinate, collapse, foreign body, persistent vomiting, severe trauma, 百合, 木糖醇, 巧克力, 葡萄, 葡萄干, 洋葱, 大蒜, 人用药, 清洁剂, 抽搐, 呼吸困难, 无法排尿, 昏迷, 异物, 持续呕吐, 严重外伤]
  output:
    chat: urgent_safety_response
    pdf: forbidden_unless_after_action_summary
    diagnosis: forbidden

timeline_update:
  triggers:
    material_types: [medical_report, lab_report, clinic_communication, appointment]
    intents: [history, timeline, archive, "整理病史"]
  output:
    chat: concise_summary
    pdf: required
    vault_update: true

travel_care:
  triggers:
    no_user_material: true
    terms: ["出差", "旅行", "航班", "飞机", "托运", "随身", "航空箱", "检疫", "健康证明", "travel", "flight", "airline", "carrier", "quarantine", "health certificate"]
  output:
    chat: short_answer_with_sources
    pdf: not_required
