name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run all unit tests
        run: python -m unittest discover -s pet-vault-skill/tests -p "test_*.py" -v
      - name: Compile Python sources
        run: python -m compileall -q pet-vault-skill/scripts pet-vault-skill/adapters pet-vault-skill/tests
      - name: Validate KB structure
        run: python pet-vault-skill/scripts/validate_kb.py pet-vault-skill
      - name: Build KB index
        run: python pet-vault-skill/scripts/build_kb_index.py pet-vault-skill
