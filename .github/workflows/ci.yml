name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python pet-vault-skill/tests/test_pet_vault_skill.py
      - name: Compile Python sources
        run: python -m compileall -q pet-vault-skill/scripts pet-vault-skill/adapters pet-vault-skill/tests
